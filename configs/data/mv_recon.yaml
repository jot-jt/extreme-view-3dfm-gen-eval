    _target_: datasets.megaunscene.MegaUnScene
    megaunscene_root: data/megaunscene
    scale_json_path: datasets/scale/unscenerecon.json
    eval_images_json_path: datasets/sample_images/unscenerecon.json
    load_img_size: ${load_img_size}
