Re10K:
  cfg:
    _target_: datasets.re10k.Re10KDataset
    Re10K_DIR: data/re10k
    seq_file: datasets/sequences/re10k_test_1715-exrot.txt  # changed due to variance in available downloaded videos
    cache_file: data/dataset_cache/re10k_relpose_test_1715-exrot_cache.npy
  sampling:
    strategy: random_order
    num_frames: 10
  seq_id_map: datasets/seq-id-maps/Re10K_relpose_seq-id-map_seed${seed}-exrot.json
  metric_thresholds: [5, 15, 30]

CO3Dv2:
  cfg:
    _target_: datasets.co3d_v2.Co3dDataset
    CO3D_DIR: data/co3dv2/data
    # CO3D_ANNOTATION_DIR: data/co3dv2/annotations
    CO3D_ANNOTATION_DIR: data/co3dv2/co3d_v2_annotations
    categories: all
  sampling:
    strategy: random_order
    num_frames: 10
  seq_id_map: datasets/seq-id-maps/CO3Dv2_relpose_seq-id-map_seed${seed}.json
  metric_thresholds: [5, 15, 30]

ETH3D:
  cfg:
    _target_: datasets.eth3d.ETH3D
    ETH3D_DIR: data/eth3d
    cache_file: data/dataset_cache/eth3d_relpose_test_cache.npy
  sampling:
    strategy: random_order
    num_frames: 10
  seq_id_map: datasets/seq-id-maps/ETH3D_relpose_seq-id-map_seed${seed}.json
  metric_thresholds: [5, 15, 30]