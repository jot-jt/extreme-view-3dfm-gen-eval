# @package _global_

defaults:
  - override /data: depth

name: monodepth

eval_models:
  # - moge
  - pi3
  - pi3_exrot
  - vggt
  - vggt_exrot
  - worldmirror
  - worldmirror_exrot

eval_datasets:
  - sintel
  - bonn
  - kitti
  - nyu-v2

invariant: median-scale  # using median(gt) / median(pred) as scale factor

overwrite: False
no_crop: True
load_img_size: 512

device: cuda

verbose: False
save_suffix: null